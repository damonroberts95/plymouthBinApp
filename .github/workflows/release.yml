name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 secret not set; building unsigned"
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "PLYMOUTH_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble release
        env:
          PLYMOUTH_KS_PASS:   ${{ secrets.RELEASE_KS_PASS }}
          PLYMOUTH_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          PLYMOUTH_KEY_PASS:  ${{ secrets.RELEASE_KEY_PASS }}
        run: ./gradlew assembleRelease --no-daemon --console=plain

      - name: Locate APK
        id: apk
        run: |
          APK=$(ls app/build/outputs/apk/release/PlymouthBins-*-release.apk | head -n1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release + upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
