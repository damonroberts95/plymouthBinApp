name: playstore

# Builds a Play-Store-safe Android App Bundle (.aab).
# Trigger by pushing a tag like `play-v1.9.4`, or run manually from the
# Actions tab (workflow_dispatch). The signed .aab is uploaded as a build
# artifact — download it and upload to Play Console (first release must be
# uploaded by hand; automated publishing can be added later).

on:
  push:
    tags:
      - 'play-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret not set; cannot sign Play bundle"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "PLYMOUTH_KEYSTORE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build Play bundle (AAB)
        env:
          PLYMOUTH_KS_PASS:   ${{ secrets.RELEASE_KS_PASS }}
          PLYMOUTH_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          PLYMOUTH_KEY_PASS:  ${{ secrets.RELEASE_KEY_PASS }}
        run: ./gradlew bundleRelease -PplayStore=true --no-daemon --console=plain

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: playstore-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      # --- Optional auto-publish to Play ---------------------------------
      # Runs only when the PLAY_SERVICE_ACCOUNT_JSON secret is set. Requires
      # the app to already exist in Play Console with at least one manual
      # release uploaded (Play rejects the very first upload via API).
      # Publishes to the `internal` testing track as a draft for safety.
      - name: Check for Play service account
        id: pa
        env:
          SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$SA" ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - name: Publish to Play (internal track, draft)
        if: steps.pa.outputs.present == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.plymouthbins.app
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: draft
