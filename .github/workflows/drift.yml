name: drift-detector

on:
  schedule:
    - cron: '17 6 * * 1'  # every Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          pip install --quiet requests playwright
          python -m playwright install --with-deps chromium

      - name: Run drift detector
        id: drift
        continue-on-error: true
        run: python scripts/drift_detector.py

      - name: Open / update issue on drift
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Council API drift detected";
            const body = `Drift detector failed on \`${new Date().toISOString()}\`.\n\n` +
              `Latest run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `Likely causes:\n- Council changed lookup ID(s)\n- Schedule row schema changed\n- Address search broken\n- Network blip (transient — re-run before panicking)`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "drift"
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["drift"],
              });
            }
